name: Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  check_build:
    # checks that a build succeeds on a pr branch
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: Node Install
        run: npm ci
      - name: Check formatting
        run: npm run fmt:check
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
